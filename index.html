<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Nine Men Morris | Real Money</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
:root{
  --g:#C8A84B;--g2:#E8C96A;--g3:#8B6914;
  --c1:#1a1a1a;--c2:#111;--bg:#080f08;
  --r:#c62828;--gr:#2E7D32;--d:#6a5a3a;--wa:#25D366;
  --board-light:#C8944A;--board-dark:#8B5E2A;
  --line:#5a3010;
  --easy:#2E7D32;--med:#F57F17;--hard:#B71C1C;
}
html,body{height:100%;overflow-x:hidden;overscroll-behavior:none;}
body{background:linear-gradient(155deg,#080f08,#040804);min-height:100vh;font-family:'Segoe UI',Arial,sans-serif;color:#fff;padding-bottom:68px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@keyframes waGlow{0%,100%{box-shadow:0 0 0 0 rgba(37,211,102,.5)}70%{box-shadow:0 0 0 14px rgba(37,211,102,0)}}
@keyframes rotateBg{to{transform:rotate(360deg)}}
@keyframes killPop{0%{transform:scale(1);opacity:1}30%{transform:scale(1.5);opacity:1}60%{transform:scale(.4);opacity:.4}100%{transform:scale(0);opacity:0}}
@keyframes placeIn{0%{transform:scale(0) rotate(-180deg);opacity:0}70%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes flyParticle{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-90px) scale(.2);opacity:0}}
@keyframes goldPulse{0%,100%{box-shadow:0 0 0 0 rgba(200,168,75,0)}50%{box-shadow:0 0 20px 4px rgba(200,168,75,.3)}}
@keyframes winBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes spinSlowIn{from{transform:rotate(-20deg) scale(.95)}to{transform:rotate(0) scale(1)}}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}

.auth-screen{
  position:fixed;inset:0;z-index:999;
  background:linear-gradient(155deg,#080f08,#040804);
  display:flex;align-items:center;justify-content:center;
  padding:20px;overflow-y:auto;
}
.auth-card{
  background:linear-gradient(145deg,#161616,#0e0e0e);
  border:1.5px solid rgba(200,168,75,.35);
  border-radius:28px;padding:28px 24px;
  max-width:410px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 0 1px rgba(200,168,75,.1);
  animation:popIn .38s cubic-bezier(.34,1.56,.64,1);
}
.auth-brand{text-align:center;margin-bottom:24px;}
.auth-brand-icon{
  width:70px;height:70px;margin:0 auto 12px;
  background:linear-gradient(135deg,#1a2a10,#0c1a05);
  border:2px solid rgba(200,168,75,.4);border-radius:18px;
  display:flex;align-items:center;justify-content:center;font-size:32px;
  box-shadow:0 8px 20px rgba(0,0,0,.4);
}
.auth-brand h1{font-size:20px;font-weight:900;letter-spacing:.5px;}
.auth-brand h1 span{background:linear-gradient(135deg,#C8A84B,#E8C96A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.auth-brand p{font-size:10px;color:var(--d);letter-spacing:2.5px;margin-top:4px;}

.auth-tabs{display:flex;background:#0a0a0a;border:1px solid rgba(200,168,75,.1);padding:4px;border-radius:50px;margin-bottom:22px;}
.auth-tab{flex:1;padding:10px;border-radius:50px;text-align:center;font-weight:700;font-size:13px;cursor:pointer;color:rgba(255,255,255,.35);transition:all .22s;border:none;background:transparent;}
.auth-tab.on{background:linear-gradient(135deg,var(--g),var(--g2));color:#000;box-shadow:0 3px 10px rgba(200,168,75,.3);}

.fld{margin-bottom:15px;}
.fld label{font-size:9px;color:rgba(200,168,75,.6);letter-spacing:1.8px;display:block;margin-bottom:6px;}
.fld input{
  background:rgba(255,255,255,.04);
  border:1.5px solid rgba(200,168,75,.2);
  border-radius:13px;padding:12px 15px;width:100%;
  color:#fff;font-size:14px;outline:none;
  transition:border-color .2s,background .2s;font-family:inherit;
}
.fld input:focus{border-color:var(--g);background:rgba(200,168,75,.06);}
.fld input.err{border-color:#ef5350!important;animation:shake .32s;}
.fld input.ok{border-color:#66BB6A!important;}

.ps-bar{height:3px;border-radius:2px;margin-top:6px;background:#1a1a1a;overflow:hidden;}
.ps-fill{height:100%;border-radius:2px;width:0;transition:width .3s,background .3s;}
.ps-label{font-size:10px;margin-top:4px;color:var(--d);}

.auth-err{background:rgba(239,83,80,.1);border:1px solid rgba(239,83,80,.3);border-radius:11px;padding:10px 13px;color:#ef5350;font-size:12px;margin-bottom:13px;display:none;line-height:1.5;}
.auth-suc{background:rgba(102,187,106,.1);border:1px solid rgba(102,187,106,.3);border-radius:11px;padding:10px 13px;color:#66BB6A;font-size:13px;font-weight:700;margin-bottom:13px;display:none;text-align:center;}

.btn-auth{background:linear-gradient(135deg,var(--g),var(--g2),var(--g3));border:none;padding:14px;border-radius:50px;font-weight:800;font-size:14px;color:#000;cursor:pointer;width:100%;box-shadow:0 5px 16px rgba(200,168,75,.35);transition:all .2s;letter-spacing:.3px;}
.btn-auth:active{transform:scale(.96);}
.btn-auth:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.auth-switch{text-align:center;font-size:12px;color:rgba(255,255,255,.3);margin-top:15px;}
.auth-switch a{color:var(--g);cursor:pointer;text-decoration:none;font-weight:700;}

.app-wrap{max-width:540px;margin:0 auto;padding:0 10px;}

.tnav{
  background:linear-gradient(135deg,#0d160d,#080808);
  border-bottom:1px solid rgba(200,168,75,.15);
  padding:9px 14px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:80;
  box-shadow:0 2px 16px rgba(0,0,0,.5);
}
.tlogo{font-size:17px;font-weight:900;letter-spacing:.5px;}
.tlogo .gl{background:linear-gradient(135deg,#C8A84B,#E8C96A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tnav-acts{display:flex;gap:8px;align-items:center;}
.tni{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .18s;}
.tni.out{background:rgba(200,168,75,.08);border:1px solid rgba(200,168,75,.2);}
.tni.wa{background:var(--wa);box-shadow:0 2px 8px rgba(37,211,102,.35);}
.user-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--g),var(--g2));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#000;cursor:pointer;border:2px solid rgba(200,168,75,.4);}

.top5{background:linear-gradient(135deg,#0d160d,#080808);padding:7px 10px;display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid rgba(200,168,75,.08);scrollbar-width:none;}
.top5::-webkit-scrollbar{display:none;}
.t5i{flex-shrink:0;background:rgba(200,168,75,.07);border:1px solid rgba(200,168,75,.14);border-radius:50px;padding:6px 12px;display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;font-weight:700;color:rgba(255,255,255,.55);transition:all .18s;white-space:nowrap;}
.t5i:active{background:linear-gradient(135deg,var(--g),var(--g2));color:#000;border-color:var(--g);}

.hero{background:linear-gradient(135deg,#0d160d,#080808);border-bottom:1px solid rgba(200,168,75,.08);padding:12px 14px;position:relative;overflow:hidden;}
.hero-glow{position:absolute;top:-80%;left:-80%;width:260%;height:260%;background:radial-gradient(circle,rgba(200,168,75,.04),transparent 55%);animation:rotateBg 40s linear infinite;pointer-events:none;}
.hero-content{position:relative;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.hero-bal .lbl{font-size:9px;color:rgba(200,168,75,.5);letter-spacing:2px;}
.hero-bal .val{font-size:24px;font-weight:900;color:var(--g);line-height:1.1;}
.hero-bal .sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:3px;}
.hero-user{display:flex;align-items:center;gap:9px;}
.hero-av{width:44px;height:44px;border-radius:50%;border:2px solid var(--g);background:linear-gradient(135deg,var(--g),var(--g2));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#000;}
.hero-info .nm{font-size:13px;font-weight:700;}
.hero-info .em{font-size:10px;color:var(--d);}
.hero-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px;position:relative;}

.page{display:none;}
.page.on{display:block;animation:fadeUp .28s ease;}

.gsec{padding:0 10px;}
.ghead{display:flex;align-items:center;justify-content:space-between;padding:8px 0 6px;gap:7px;}
.ghead-side{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:50px;padding:7px 13px;display:flex;align-items:center;gap:8px;}
.gpiece{width:22px;height:22px;border-radius:50%;flex-shrink:0;}
.gpiece.w{background:radial-gradient(circle at 35% 35%,#fff,#ccc,#999);}
.gpiece.b{background:radial-gradient(circle at 35% 35%,#555,#111,#000);border:1px solid #666;}
.ginfo .lbl{font-size:8px;color:rgba(255,255,255,.35);letter-spacing:1px;}
.ginfo .cnt{font-size:18px;font-weight:800;line-height:1;}

.tmr{position:relative;width:48px;height:48px;flex-shrink:0;display:none;}
.tmr svg{transform:rotate(-90deg);}
.tmr-bg{fill:none;stroke:#222;stroke-width:4;}
.tmr-ring{fill:none;stroke:var(--g);stroke-width:4;stroke-linecap:round;stroke-dasharray:188;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .3s;}
.tmr-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;font-weight:800;color:var(--g);}

.board-wrap{
  background:linear-gradient(145deg,#1a1308,#0e0b04);
  border-radius:22px;padding:12px;margin-bottom:10px;
  box-shadow:0 12px 40px rgba(0,0,0,.6),0 0 0 1px rgba(200,168,75,.12);
  animation:goldPulse 5s ease-in-out infinite;
  position:relative;
}
.diff-badge{
  position:absolute;top:8px;right:8px;z-index:5;
  font-size:9px;font-weight:800;padding:3px 8px;border-radius:50px;letter-spacing:.5px;
}
.diff-badge.easy{background:rgba(46,125,50,.2);color:#4CAF50;border:1px solid rgba(76,175,80,.3);}
.diff-badge.med{background:rgba(245,127,23,.2);color:#FFA726;border:1px solid rgba(255,167,38,.3);}
.diff-badge.hard{background:rgba(183,28,28,.2);color:#EF5350;border:1px solid rgba(239,83,80,.3);}

canvas#gc{display:block;width:100%;height:auto;max-width:490px;margin:0 auto;touch-action:none;cursor:pointer;border-radius:14px;}

.fly-badge{text-align:center;margin:6px 0;display:none;}
.fly-badge span{background:linear-gradient(135deg,#3d0b5a,#6a1b96);border:1px solid #ba68c8;border-radius:50px;padding:4px 14px;font-size:10px;font-weight:700;color:#e1bee7;display:inline-block;}

.status-row{
  background:rgba(200,168,75,.04);border-left:3px solid var(--g);
  border-radius:12px;padding:8px 12px;margin-bottom:8px;
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;font-size:11px;
}
.msg-box{
  background:rgba(200,168,75,.04);border:1px solid rgba(200,168,75,.1);
  border-radius:12px;padding:9px 13px;margin-bottom:10px;
  text-align:center;font-size:12px;color:var(--g);min-height:36px;
  display:flex;align-items:center;justify-content:center;
}
.win-bar{height:5px;border-radius:3px;margin-bottom:10px;background:#1a1a1a;overflow:hidden;display:flex;}
.win-bar-p{background:linear-gradient(90deg,#42A5F5,#1565C0);transition:width .5s ease;}
.win-bar-a{background:linear-gradient(90deg,#EF5350,#B71C1C);transition:width .5s ease;}

.bcard{background:rgba(255,255,255,.03);border:1px solid rgba(200,168,75,.12);border-radius:20px;padding:14px;margin-bottom:10px;}
.bcard-lbl{font-size:9px;color:rgba(200,168,75,.5);letter-spacing:2px;margin-bottom:8px;}
.bet-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.bchip{background:rgba(255,255,255,.04);border:1.5px solid rgba(200,168,75,.2);border-radius:40px;padding:7px 14px;font-weight:700;color:rgba(200,168,75,.6);cursor:pointer;font-size:13px;transition:all .15s;}
.bchip.on{background:linear-gradient(135deg,var(--g),var(--g2));color:#000;border-color:transparent;box-shadow:0 3px 10px rgba(200,168,75,.3);}
.bchip:active{transform:scale(.93);}
.bet-inp{background:rgba(255,255,255,.04);border:1.5px solid rgba(200,168,75,.2);border-radius:12px;padding:10px;width:100%;color:var(--g);font-size:13px;font-weight:700;text-align:center;outline:none;font-family:inherit;transition:border-color .2s;}
.bet-inp:focus{border-color:var(--g);}
.bet-inp::placeholder{color:rgba(200,168,75,.25);}
.game-btns{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px;}

.paylogos{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:8px 12px;background:rgba(255,255,255,.03);border-radius:50px;margin-bottom:10px;}
.plg{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);}

.hscroll{max-height:140px;overflow-y:auto;scrollbar-width:thin;}
.hrow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px;}
.c-win{color:#66BB6A;font-weight:700;}.c-loss{color:#EF5350;font-weight:700;}.c-dep{color:#42A5F5;font-weight:700;}.c-wit{color:#FFA726;font-weight:700;}

.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.pay-card{
  background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);
  border-radius:14px;padding:11px 9px;cursor:pointer;
  display:flex;align-items:center;gap:9px;position:relative;
  transition:all .18s;
}
.pay-card:active,.pay-card.sel{border-color:var(--g);background:rgba(200,168,75,.07);box-shadow:0 0 14px rgba(200,168,75,.18);}
.pay-logo-box{width:48px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.pay-nm{font-size:12px;font-weight:700;flex:1;}
.pay-bonus{position:absolute;top:5px;right:5px;background:#c62828;color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;}
.dep-amts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.damt{background:rgba(255,255,255,.04);border:1.5px solid rgba(200,168,75,.18);border-radius:10px;padding:8px 4px;text-align:center;font-weight:700;font-size:12px;color:rgba(200,168,75,.6);cursor:pointer;transition:all .15s;}
.damt:active,.damt.on{background:var(--g);color:#000;border-color:transparent;}
.dep-promo{background:rgba(255,255,255,.03);border:1px solid rgba(200,168,75,.14);border-radius:14px;padding:13px;margin-bottom:11px;}

.spin-card{background:linear-gradient(135deg,#0a1f0a,#051205);border:1.5px solid rgba(46,125,50,.3);border-radius:20px;padding:20px;text-align:center;margin-bottom:10px;}
.sww{position:relative;width:270px;height:290px;margin:0 auto 14px;}
.sw-ptr{position:absolute;top:-4px;left:50%;transform:translateX(-50%);z-index:10;}
.spin-res{font-size:14px;font-weight:700;color:var(--g);text-align:center;min-height:22px;margin-bottom:13px;}

.chat-card{background:rgba(255,255,255,.03);border:1px solid rgba(200,168,75,.1);border-radius:18px;overflow:hidden;margin-bottom:10px;}
.chat-hdr{background:linear-gradient(135deg,#1B5E20,#2E7D32);padding:11px 14px;display:flex;align-items:center;gap:10px;}
.chat-av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:16px;}
.onl{width:7px;height:7px;border-radius:50%;background:#4eff91;display:inline-block;margin-left:4px;}
.chat-msgs{background:#080808;padding:10px;max-height:220px;overflow-y:auto;scrollbar-width:thin;}
.cm{margin-bottom:6px;font-size:12px;line-height:1.5;}
.cbot{color:var(--g);}.cusr{color:#fff;text-align:right;}
.ct{font-size:9px;color:var(--d);display:block;margin-top:1px;}
.chat-foot{padding:8px;background:rgba(255,255,255,.02);display:flex;gap:7px;}
.chat-lim{font-size:10px;color:var(--d);text-align:center;padding:2px 8px 6px;background:rgba(255,255,255,.02);}

.prof-av{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,var(--g),var(--g2));display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:#000;margin:0 auto 10px;border:3px solid var(--g);box-shadow:0 0 20px rgba(200,168,75,.3);}
.prof-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0;}
.pstat{background:rgba(255,255,255,.03);border:1px solid rgba(200,168,75,.12);border-radius:14px;padding:10px;text-align:center;}
.pstat .pv{font-size:16px;font-weight:800;color:var(--g);}
.pstat .pk{font-size:9px;color:var(--d);letter-spacing:1px;margin-top:2px;}
.pmenu-row{display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.03);border:1px solid rgba(200,168,75,.1);border-radius:15px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s;}
.pmenu-row:active{background:rgba(200,168,75,.07);}
.pmenu-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.pmenu-inf{flex:1;}
.pmenu-inf h4{font-size:12px;font-weight:700;}
.pmenu-inf p{font-size:10px;color:var(--d);}

.vip-card{background:linear-gradient(135deg,#2d1f00,#1a1208);border:1.5px solid rgba(200,168,75,.3);border-radius:16px;padding:13px;margin-bottom:9px;display:flex;align-items:center;gap:12px;}
.offer-card{background:rgba(255,255,255,.03);border:1px solid rgba(200,168,75,.12);border-radius:16px;padding:13px;margin-bottom:9px;display:flex;align-items:center;gap:12px;}
.offer-badge{margin-left:auto;background:linear-gradient(135deg,var(--g),var(--g2));color:#000;font-size:10px;font-weight:800;padding:3px 10px;border-radius:50px;white-space:nowrap;}

.rcode-box{background:rgba(255,255,255,.03);border:1px dashed rgba(200,168,75,.28);border-radius:13px;padding:12px;text-align:center;margin-bottom:11px;}
.rsrow{display:flex;gap:7px;flex-wrap:wrap;}
.rsb{flex:1;min-width:75px;padding:9px;border-radius:50px;font-weight:700;font-size:11px;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;}
.rsb:active{transform:scale(.95);}
.rswa{background:#25D366;color:#fff;}
.rsig{background:linear-gradient(135deg,#f09433,#dc2743,#bc1888);color:#fff;}
.rscopy{background:rgba(200,168,75,.1);border:1.5px solid var(--g)!important;color:var(--g);}

.btn-gold{background:linear-gradient(135deg,var(--g),var(--g2),var(--g3));border:none;padding:13px 16px;border-radius:50px;font-weight:800;font-size:13px;color:#000;cursor:pointer;width:100%;box-shadow:0 4px 14px rgba(200,168,75,.28);transition:all .2s;letter-spacing:.2px;}
.btn-gold:active{transform:scale(.96);}
.btn-out{background:rgba(200,168,75,.07);border:1.5px solid rgba(200,168,75,.22);padding:11px 14px;border-radius:50px;font-weight:700;color:var(--g);cursor:pointer;width:100%;font-size:12px;transition:all .2s;}
.btn-out:active{background:rgba(200,168,75,.15);}
.btn-red{background:linear-gradient(135deg,var(--r),#7a0000);border:none;padding:8px 15px;border-radius:50px;font-weight:700;color:#fff;cursor:pointer;font-size:12px;transition:all .18s;}
.btn-red:active{transform:scale(.95);}
.btn-grn{background:linear-gradient(135deg,var(--gr),#145214);border:none;padding:13px 16px;border-radius:50px;font-weight:800;color:#fff;cursor:pointer;width:100%;font-size:13px;transition:all .2s;}
.btn-grn:active{transform:scale(.96);}
.inp{background:rgba(255,255,255,.04);border:1.5px solid rgba(200,168,75,.2);border-radius:12px;padding:11px 13px;width:100%;color:#fff;font-size:14px;outline:none;margin-bottom:9px;font-family:inherit;transition:border-color .2s;}
.inp:focus{border-color:var(--g);}
.inp::placeholder{color:rgba(200,168,75,.2);}
.inp-lbl{font-size:9px;color:rgba(200,168,75,.5);letter-spacing:1.5px;margin-bottom:4px;}
.pnote{background:rgba(255,165,0,.07);border:1px solid rgba(255,165,0,.2);border-radius:10px;padding:9px;margin-bottom:10px;font-size:11px;color:#FFA726;line-height:1.6;}
.sec-title{font-size:17px;font-weight:900;color:var(--g);padding:10px 0 12px;}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(200,168,75,.1);border-radius:20px;padding:14px;margin-bottom:11px;}
.card h4{font-size:13px;font-weight:700;color:var(--g);margin-bottom:9px;}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(14px);z-index:900;align-items:center;justify-content:center;padding:14px;}
.modal.on{display:flex;animation:fadeUp .22s ease;}
.modal-box{background:linear-gradient(145deg,#161616,#0e0e0e);border:1.5px solid rgba(200,168,75,.3);border-radius:26px;padding:20px;max-width:400px;width:100%;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 20px 50px rgba(0,0,0,.7);}
.modal-box h3{color:var(--g);font-size:16px;margin-bottom:14px;font-weight:900;}
.modal-close{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.res-icon{font-size:64px;text-align:center;margin-bottom:8px;animation:winBounce 1s ease infinite;}
.res-title{font-size:22px;font-weight:900;text-align:center;margin-bottom:5px;}
.res-msg{color:var(--d);text-align:center;font-size:12px;margin-bottom:5px;}
.res-amt{font-size:20px;font-weight:800;color:var(--g);text-align:center;margin-bottom:16px;}

.bnav{position:fixed;bottom:0;left:0;right:0;z-index:90;background:linear-gradient(135deg,#0d160d,#080808);border-top:1px solid rgba(200,168,75,.15);display:flex;width:100%;box-shadow:0 -4px 20px rgba(0,0,0,.5);}
.bni{flex:1;padding:9px 2px 11px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .15s;position:relative;min-height:60px;justify-content:center;}
.bni .ico{font-size:22px;line-height:1;transition:transform .15s;}
.bni .lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.3px;}
.bni.on .lbl{color:var(--g);}
.bni.on .ico{filter:drop-shadow(0 0 6px rgba(200,168,75,.7));}
.bni.on::before{content:'';position:absolute;top:0;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,var(--g),transparent);}
.bni:active .ico{transform:scale(.82);}
